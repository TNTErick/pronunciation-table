<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonetic Table Renderer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Serif+KR:wght@200..900&family=Zen+Antique+Soft&display=swap');

        @font-face {
            font-family: 'Genwan Serif';
            /* Name you choose to use in your CSS */
            src: url('https://raw.githubusercontent.com/ButTaiwan/genwan-font/master/otf/TW/GenWanMin2TW-SB.otf') format('opentype');
            /* url('https://raw.githubusercontent.com/ButTaiwan/genwan-font/master/ttc/GenWanMin2-SB.ttc') format('ttc'); */
            font-weight: normal;
            font-style: normal;
            font-display: swap;
            /* Recommended for better performance */
        }

        @font-face {
            font-family: 'Genyo Sans';
            /* Name you choose to use in your CSS */
            src: url('https://raw.githubusercontent.com/ButTaiwan/genyog-font/master/otf/TW/GenYoGothic2TW-B.otf') format('opentype');
            /* url('https://raw.githubusercontent.com/ButTaiwan/genwan-font/master/ttc/GenWanMin2-SB.ttc') format('ttc'); */
            font-weight: bold;
            font-style: normal;
            font-display: swap;
            /* Recommended for better performance */
        }

        @font-face {
            font-family: 'Genyo Sans';
            /* Name you choose to use in your CSS */
            src: url('https://raw.githubusercontent.com/ButTaiwan/genyog-font/master/otf/TW/GenYoGothic2TW-R.otf') format('opentype');
            /* url('https://raw.githubusercontent.com/ButTaiwan/genwan-font/master/ttc/GenWanMin2-SB.ttc') format('ttc'); */
            font-weight: normal;
            font-style: normal;
            font-display: swap;
            /* Recommended for better performance */
        }

        :root {
            --ui-font: "Genyo Sans", "Noto Sans KR", sans-serif;
            --char-font: "Genwan Serif", serif;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--ui-font);
            font-size: x-large;
            color: #ecf0f1;
        }

        /* --- Search Bar Styling --- */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 90%;
            max-width: 600px;
        }

        #input-char {
            flex-grow: 1;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid #fff;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }

        #render-btn {
            padding: 0 25px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #385140;
            color: white;
            border: 2px solid #fff;
            border-radius: 4px;
            /* transition: background 0.2s; */
        }

        #render-btn:hover {
            background-color: #4a6b54;
        }

        /* --- Chalkboard Styling --- */
        .chalkboard {
            background-color: #385140;
            border: 4px solid #fff;
            border-collapse: collapse;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 1000px;
        }

        .chalkboard td {
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 15px;
            text-align: center;
            vertical-align: middle;
        }

        .label {
            width: 15%;
            font-size: 1.2rem;
        }

        .header {
            font-weight: bold;
        }

        /* --- Font-Family Differentiation --- */
        .character-cell {
            font-family: var(--char-font);
            padding: 40px;
        }

        .main-character {
            font-size: 7rem;
        }

        .reg-marker {
            font-size: 2rem;
        }

        @media (max-width: 600px) {
            .main-character {
                font-size: 4rem;
            }

            .controls {
                flex-direction: row;
            }

            #input-char {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="controls">
        <input type="text" id="input-char" placeholder="光 kng [白]" autocomplete="off">
        <button id="render-btn">Render</button>
    </div>

    <table class="chalkboard">
        <tbody>
            <tr>
                <td class="label">聲 調</td>
                <td colspan="4" class="tone-desc" id="display-tone">
                    陰平聲（編號 ①）：「稍高，平」
                </td>
            </tr>
            <tr>
                <td rowspan="2" class="label">音節結構</td>
                <td rowspan="2" class="header">聲母 (C)</td>
                <td colspan="3" class="header">韻母</td>
            </tr>
            <tr>
                <td>介音 (V)</td>
                <td>韻腹 (V)</td>
                <td>韻尾 (C)</td>
            </tr>
            <tr>
                <td class="label">拼音</td>
                <td id="ipa-initial">k（清不送氣）</td>
                <td id="ipa-medial"></td>
                <td id="ipa-nucleus"></td>
                <td id="ipa-coda">ng [ŋ̍]</td>
            </tr>
            <!-- <tr>
                <td class="label">注 音</td>
                <td id="zy-initial" style="font-size: 1.5rem;">ㄍ</td>
                <td id="zy-medial"></td>
                <td id="zy-nucleus"></td>
                <td id="zy-coda" style="font-size: 1.5rem;">ㆭ</td>
            </tr> -->
            <tr>
                <td class="label">漢 字</td>
                <td colspan="4" class="character-cell">
                    <span class="main-character" id="display-char">光</span>
                    <span class="reg-marker" id="display-reg">[白]</span>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        const input = document.getElementById('input-char');
        const btn = document.getElementById('render-btn');
        const char = document.getElementById('display-char');
        const bunpeh = document.getElementById('display-reg');



        function parseRoman(roman) {
            const toreplace = Object.entries({
                "ir": "y",
                "er": "w",
                "oo": "x",
                "ee": "z",
                "ae": "z",


                // 將調符轉換為調號 (1-8)
                "\u0300": "3",
                "\u0301": "2",
                "\u0302": "5",
                "\u0304": "7",
                "\u0306": "6",
                "\u030c": "6",
                "\u030d": "8",
                "\u030b": "9",
            });

            // remove the diacritics
            roman = roman
                // .toLowercase()
                .normalize("NFD");
            toreplace.forEach(([left, right]) => {
                roman = roman.replace(left, right);
            });

            // if the tone is 2356789 it would be decided now.

            const tonenum = roman[roman.search(/[2356789]/g)];

            //remove any non-roman letters.
            const splitted = roman.replace(/[^a-z]/g, "").split(/[aeiouwxyz]+/g);
            const [initial, coda] = splitted;
            console.log(splitted)
            const tone = tonenum || ("ptk".includes(coda) || coda?.[coda.length-1]==='h') && '4' || '1';

            document.getElementById('ipa-initial').innerText = initial;
            document.getElementById('display-tone').innerText = tone;

            let vowels = roman.slice(initial?.length, roman.length-coda?.length);
            console.log(vowels)
            if (vowels.length > 2)
                var [medial, nucleus, offglide] = [vowels[0], vowels.slice(0, -1), vowels[vowels.length-1]];
            else if (vowels.length === 1)
                var [medial, nucleus, offglide] = ['', vowels, ''];
            else if ("iuyw".includes(vowels[0]))
                var [medial, nucleus, offglide] = [vowels[0], vowels[1], ''];
            else
                var [medial, nucleus, offglide] = ['', vowels[0], vowels[1]];


            toreplace.forEach(([l, r]) => {
                medial = medial.replace(r, l);
                offglide = offglide.replace(r, l);
                nucleus = nucleus.replace(r, l);
            });
            console.log(medial, nucleus, offglide)
            document.getElementById('ipa-coda').innerText = offglide + coda;
            document.getElementById('ipa-medial').innerText = medial;
            document.getElementById('ipa-nucleus').innerText = nucleus;

        }

        function handleRender() {
            const val = input.value.trim().split(" ");
            if (val[0] == '') return;

            console.log("Rendering for:", val);

            char.innerText = val[0];
            const roman = val[1];
            bunpeh.innerText = val[2];
            parseRoman(roman);



        }

        btn.addEventListener('click', handleRender);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleRender();
            }
        });
    </script>
</body>

</html>
